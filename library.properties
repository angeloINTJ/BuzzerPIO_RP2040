sentence=Ultrasonic PWM tone generation for passive buzzers using the RP2040 PIO coprocessor.
paragraph=Dual state-machine architecture: SM1 generates an ultrasonic PWM carrier (~95 kHz) for distortion-free volume control, SM2 gates it at the audible frequency. Uses only 4 PIO instructions, auto-probes both PIO blocks, zero DMA, zero IRQ handlers. Coexists with OneWirePIO, DHT22PIO, and CYW43 WiFi. Non-blocking melody sequencing via hardware alarm chain. Drop-in replacement for v1.x.
